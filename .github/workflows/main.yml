name: Windows CUDA 13.0 Wheel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      MAX_JOBS: 2
      FLASH_ATTENTION_FORCE_BUILD: TRUE
      BUILD_TARGET: cuda
      DISTUTILS_USE_SDK: 1

    steps:
      - name: Enable long paths in git
        run: |
          git config --global core.longpaths true
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: '14.4'  # Visual Studio 2022 toolset
      # --------------------------------------------------
      # Checkout TAG v2.8.3
      # --------------------------------------------------
      - name: Checkout tag fa4-v4.0.0.beta14
        uses: actions/checkout@v4
        with:
          ref: fa4-v4.0.0.beta14
          fetch-depth: 0

      # --------------------------------------------------
      # Python 3.12
      # --------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # --------------------------------------------------
      # CUDA Toolkit 13.0
      # --------------------------------------------------
      - name: Install CUDA Toolkit 13.0
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.0.0'

      - name: Verify CUDA
        run: nvcc -V

      # --------------------------------------------------
      # PyTorch cu130
      # --------------------------------------------------
      - name: Install PyTorch (CUDA 13.0)
        run: |
          pip install torch==2.12.0 torchvision==0.27.0 torchaudio --index-url https://download.pytorch.org/whl/cu130

      # --------------------------------------------------
      # Build dependencies
      # --------------------------------------------------
      - name: Install build dependencies
        run: |
          pip install "setuptools>=49.6.0" packaging wheel psutil

      # --------------------------------------------------
      # Build wheel
      # --------------------------------------------------
      - name: Build wheel
        env:
          NVCC_FLAGS: "--allow-unsupported-compiler"
        run: |
          python setup.py bdist_wheel --dist-dir=dist

      # --------------------------------------------------
      # Upload artifact
      # --------------------------------------------------
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda-wheel
          path: dist/*.whl
